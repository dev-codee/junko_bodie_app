name: junko_bodie
description: "Junko Bodie Roulette Tournament — Premium play-money roulette simulator."
publish_to: 'none'
version: 1.0.0+9

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Auth
  supabase_flutter: ^2.8.0

  # HTTP / Networking
  http: ^1.3.0

  # State Management
  provider: ^6.1.0

  # Navigation
  go_router: ^15.1.0

  # Typography
  google_fonts: ^6.2.1

  # Audio
  audioplayers: ^6.1.0

  # Text-to-Speech (tournament commentary)
  flutter_tts: ^4.2.0

  # Animations
  flutter_animate: ^4.5.2

  # Local Storage
  shared_preferences: ^2.5.0

  # Image Caching
  cached_network_image: ^3.4.1

  # External links
  url_launcher: ^6.3.1

  # Confetti celebrations
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/avatars/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "e:/junko_bodie/public/roulette-wheel-hero.png"
  windows:
    generate: true
    image_path: "e:/junko_bodie/public/roulette-wheel-hero.png"
  macos:
    generate: true
    image_path: "e:/junko_bodie/public/roulette-wheel-hero.png"
  image_path: "e:/junko_bodie/public/roulette-wheel-hero.png"

